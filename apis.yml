aid: infleqtion
name: Infleqtion
description: >-
  Infleqtion is a Louisville/Boulder, Colorado quantum-technology company —
  formerly ColdQuanta — that builds neutral-atom quantum computers, precision
  atomic clocks, and quantum sensors for governments, corporations, and
  research institutions. Its computing portfolio spans Sqale (a full-stack,
  fault-tolerant neutral-atom quantum computer), Quantum Cores (ready-to-use
  neutral-atom systems for laboratories), and Superstaq, an open-source
  quantum software platform with proprietary cross-layer optimization that
  compiles Qiskit, Cirq, and OpenQASM circuits down to hardware-native
  operations and routes them across heterogeneous quantum backends.
  Infleqtion's sensing portfolio includes the Tiqker optical atomic clock,
  Quantum Spectrum (Rydberg atomic spectrum sensing), and inertial sensors
  for GPS-denied positioning. The company was founded in 2007 as ColdQuanta,
  rebranded to Infleqtion in November 2022 after absorbing the Super.tech
  quantum-software acquisition, and became Infleqtion, Inc. (NASDAQ: INFQ)
  in January 2026. Superstaq (qiskit-superstaq, cirq-superstaq,
  general-superstaq) is the only developer-facing public surface; the
  hardware and sensing businesses are sold via direct engagement and
  government contracts rather than a self-serve API.
