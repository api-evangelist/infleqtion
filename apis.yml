apis:
  - aid: infleqtion:superstaq
    name: Superstaq
    description: >-
      Superstaq is Infleqtion's open-source quantum software platform.
      Developers write circuits in Qiskit, Cirq, or OpenQASM, and Superstaq
      applies cross-layer compilation, dynamical-decoupling error mitigation,
      and hardware-native gate decomposition to deliver up to ~10x performance
      on benchmarks. Distributed as three pip packages — qiskit-superstaq,
      cirq-superstaq, and general-superstaq — backed by a hosted execution
      service that routes jobs across heterogeneous quantum backends. Apache
      2.0 licensed client; the underlying REST service requires an Infleqtion
      API key obtained via request.
    humanURL: https://superstaq.readthedocs.io/en/latest/
